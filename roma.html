<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숫자 기호 1-100 가이드</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --bg: #f1f5f9;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        header { text-align: center; margin-bottom: 25px; }
        header h1 { font-size: 1.3rem; margin: 0; color: #1e293b; }
        header p { font-size: 0.85rem; color: #64748b; margin-top: 5px; }
        
        select {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            margin-bottom: 20px;
            outline: none;
        }
        
        .list-container { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            max-height: 60vh; /* 리스트 영역 스크롤 */
            overflow-y: auto;
            padding-right: 5px;
        }
        
        /* 스크롤바 디자인 */
        .list-container::-webkit-scrollbar { width: 6px; }
        .list-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .list-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #f1f5f9;
        }
        .symbol-box {
            flex: 1;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
        }
        .info-num {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-right: 15px;
            min-width: 30px;
        }
        .copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .copy-btn.copied { background: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🔢 숫자 기호 (1~100)</h1>
        <p>복사할 기호를 선택하세요</p>
    </header>
    
    <select id="type-select" onchange="render()">
        <option value="roman_up">로마 숫자 (대문자)</option>
        <option value="roman_low">로마 숫자 (소문자)</option>
        <option value="hanja_basic">한자 숫자 (기본)</option>
        <option value="hanja_pro">한자 숫자 (금융/갖은자)</option>
        <option value="circle_white">원문자 (1~50까지만 지원)</option>
    </select>

    <div id="list-box" class="list-container"></div>
</div>

<script>
    // 로마 숫자 변환 함수
    function toRoman(num) {
        const lookup = {M:1000,CM:900,D:500,CD:400,C:100,XC:90,L:50,XL:40,X:10,IX:9,V:5,IV:4,I:1};
        let roman = '';
        for (let i in lookup) {
            while (num >= lookup[i]) {
                roman += i;
                num -= lookup[i];
            }
        }
        return roman;
    }

    // 한자 변환 함수 (간단 버전 1~100)
    function toHanja(num, type) {
        const units = type === 'basic' ? ["", "一", "二", "三", "四", "五", "六", "七", "八", "九"] : ["", "壹", "貳", "參", "肆", "伍", "陸", "柒", "捌", "玖"];
        const tens = type === 'basic' ? "十" : "拾";
        
        if (num === 100) return type === 'basic' ? "百" : "佰";
        if (num < 10) return units[num];
        
        let res = "";
        let t = Math.floor(num / 10);
        let u = num % 10;
        
        if (t > 1) res += units[t];
        res += tens;
        res += units[u];
        return res;
    }

    function render() {
        const type = document.getElementById('type-select').value;
        const box = document.getElementById('list-box');
        let items = [];

        for (let i = 1; i <= 100; i++) {
            let symbol = '';
            if (type === 'roman_up') symbol = toRoman(i);
            else if (type === 'roman_low') symbol = toRoman(i).toLowerCase();
            else if (type === 'hanja_basic') symbol = toHanja(i, 'basic');
            else if (type === 'hanja_pro') symbol = toHanja(i, 'pro');
            else if (type === 'circle_white') {
                if (i > 50) break; // 원문자는 표준적으로 50까지만 제공됨
                symbol = String.fromCharCode(9311 + i);
                if (i > 20) symbol = String.fromCharCode(12860 + i); // 21번부터 영역 다름
            }
            
            items.push(`
                <div class="list-item">
                    <div class="info-num">${i}</div>
                    <div class="symbol-box">${symbol}</div>
                    <button class="copy-btn" onclick="copyText('${symbol}', this)">복사</button>
                </div>
            `);
        }
        box.innerHTML = items.join('');
        box.scrollTop = 0;
    }

    function copyText(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const prev = btn.innerText;
            btn.innerText = "OK!";
            btn.classList.add('copied');
            setTimeout(() => {
                btn.innerText = prev;
                btn.classList.remove('copied');
            }, 800);
        });
    }

    render();
</script>

</body>
</html>
