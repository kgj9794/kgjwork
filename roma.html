<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기호 복사 가이드</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --bg: #f1f5f9;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        header { text-align: center; margin-bottom: 25px; }
        header h1 { font-size: 1.3rem; margin: 0; color: #1e293b; }
        header p { font-size: 0.85rem; color: #64748b; margin-top: 5px; }
        
        select {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            margin-bottom: 20px;
            outline: none;
            cursor: pointer;
        }
        
        .list-container { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        .list-container::-webkit-scrollbar { width: 6px; }
        .list-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .list-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #f1f5f9;
        }
        .symbol-box {
            flex: 1;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
        }
        .info-num {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-right: 15px;
            min-width: 35px;
        }
        .copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .copy-btn.copied { background: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🔢 목차 기호 복사기</h1>
        <p>복사할 기호를 선택하세요</p>
    </header>
    
    <select id="type-select" onchange="render()">
        <option value="roman_low">로마 숫자 (소문자)</option>
        <option value="roman_up">로마 숫자 (대문자)</option>
        <option value="hangeul_order">한글 순서 (가, 나, 다...)</option>
        <option value="circle_white">원문자 숫자 (①, ②...)</option>
        <option value="circle_hangeul">원문자 한글 (㉮, ㉯...)</option>
    </select>

    <div id="list-box" class="list-container"></div>
</div>

<script>
    // 로마 숫자 변환
    function toRoman(num) {
        const lookup = {M:1000,CM:900,D:500,CD:400,C:100,XC:90,L:50,XL:40,X:10,IX:9,V:5,IV:4,I:1};
        let roman = '';
        for (let i in lookup) {
            while (num >= lookup[i]) {
                roman += i;
                num -= lookup[i];
            }
        }
        return roman;
    }

    // 한글 순서 생성 (가, 나, 다... 하, 거, 너...)
    function getHangeulOrder(i) {
        const base = ["가", "나", "다", "라", "마", "바", "사", "아", "자", "차", "카", "타", "파", "하"];
        if (i <= base.length) return base[i-1];
        return `(${i})`; // 14번 이후는 숫자로 대체 표기하는 경우가 많음
    }

    function render() {
        const type = document.getElementById('type-select').value;
        const box = document.getElementById('list-box');
        let items = [];

        for (let i = 1; i <= 100; i++) {
            let symbol = '';
            
            if (type === 'roman_low') symbol = toRoman(i).toLowerCase();
            else if (type === 'roman_up') symbol = toRoman(i);
            else if (type === 'hangeul_order') {
                if (i > 14) break; // 한글 가나다순은 보통 하(14)까지만 사용
                symbol = getHangeulOrder(i);
            }
            else if (type === 'circle_white') {
                if (i > 50) break;
                symbol = String.fromCharCode(9311 + i);
                if (i > 20) symbol = String.fromCharCode(12860 + i);
            }
            else if (type === 'circle_hangeul') {
                if (i > 14) break;
                symbol = String.fromCharCode(13023 + i);
            }
            
            items.push(`
                <div class="list-item">
                    <div class="info-num">${i}</div>
                    <div class="symbol-box">${symbol}</div>
                    <button class="copy-btn" onclick="copyText('${symbol}', this)">복사</button>
                </div>
            `);
        }
        box.innerHTML = items.join('');
        box.scrollTop = 0;
    }

    function copyText(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const prev = btn.innerText;
            btn.innerText = "복사됨";
            btn.classList.add('copied');
            setTimeout(() => {
                btn.innerText = prev;
                btn.classList.remove('copied');
            }, 800);
        });
    }

    render();
</script>

</body>
</html>
